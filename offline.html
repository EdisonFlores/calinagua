<!doctype html>
<html lang="es" data-bs-theme="light">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PVQQZYWPYE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-PVQQZYWPYE');
    </script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e">
    <title>CALINAGUA | Sin conexion</title>
    <link rel="icon" href="img/logo.png">
    <link rel="apple-touch-icon" href="img/icons/icon-192.png">
    <!-- Estilos autocontenidos para que la pantalla offline no dependa de internet. -->
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7faf9;
        --surface: #ffffff;
        --text: #111827;
        --soft: #667085;
        --brand: #0f766e;
        --border: rgba(15, 23, 42, 0.12);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1220;
          --surface: #111827;
          --text: #f8fafc;
          --soft: #a8b3c7;
          --border: rgba(226, 232, 240, 0.14);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 440px);
        display: grid;
        gap: 18px;
        padding: 24px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        text-align: center;
      }

      img {
        width: 72px;
        height: 72px;
        margin: 0 auto;
        object-fit: contain;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.35rem, 5vw, 1.85rem);
      }

      p {
        margin: 0;
        color: var(--soft);
        line-height: 1.5;
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        color: #ffffff;
        background: var(--brand);
        font: inherit;
        font-weight: 750;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- Mensaje PWA cuando el dispositivo no tiene conexion disponible. -->
    <main>
      <img src="img/logo.png" alt="CALINAGUA">
      <h1>Se necesita conexion a internet</h1>
      <p>CALINAGUA usa mapas, graficas, clima y datos externos. Conecta el dispositivo a internet y vuelve a intentarlo.</p>
      <button type="button" onclick="location.reload()">Reintentar</button>
    </main>
  </body>
</html>
